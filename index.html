
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogniHood | Cognitive Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --emerald-glow: rgba(16, 185, 129, 0.15);
            --sky-glow: rgba(14, 165, 233, 0.15);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020202;
            color: #f8fafc;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        .mono {
            font-family: 'JetBrains+Mono', monospace;
        }

        .glass-panel {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .scanline {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(16, 185, 129, 0.5), transparent);
            position: absolute;
            z-index: 10;
            top: 0;
            left: 0;
            animation: scan 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .pulse-emerald {
            animation: pulse-emerald 3s infinite;
        }

        @keyframes pulse-emerald {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Ambient Background Glows */
        .glow-1 {
            position: fixed; top: -10%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, var(--emerald-glow) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }
        .glow-2 {
            position: fixed; bottom: -10%; right: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, var(--sky-glow) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div id="root"></div>
</body>
</html>
